name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache vcpkg dependencies
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-test-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-test-

      - name: Setup environment (Linux/macOS)
        if: runner.os != 'Windows'
        run: echo "VCPKG_ROOT=${VCPKG_INSTALLATION_ROOT}" >> $GITHUB_ENV

      - name: Setup environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        run: cmake --preset test -B ${{ github.workspace }}/build -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --target media-analyser-tests

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest --output-on-failure --no-tests=error